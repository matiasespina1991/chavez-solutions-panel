name: Admin Tests

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  admin-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/panel
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: apps/panel/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Run unit tests
        run: npm run test

      - name: Run coverage
        run: npm run test:coverage
